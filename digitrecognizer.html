<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Digit Recognizer</title>
        <link rel="icon" type="image/svg+xml" href="icons/digitrecognizer/favicon.svg">
        <link rel="icon" sizes="any" href="icons/index/favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="icons/index/apple-touch-icon.png">
        <link rel="manifest" href="icons/index/site.webmanifest">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
        <link rel="stylesheet" href="css/digitrecognizer.css">
    </head>
    <body>
        <header>
            <h1>Digit Recognizer</h1>
        </header>
        <main>
            <canvas id="canvas" class="canvas">
            </canvas>
            <div class="main-buttons">
                <div class="main-button" onclick="clearCanvas()">
                    <p>Clear</p>
                </div>
                <div class="main-button" onclick="recognizeDigit()">
                    <p>Recognize</p>
                </div>
            </div>
        </main>
        <!-- <canvas id="canvas" class="canvas"></canvas> -->
        <script type=text/javascript src="js/digitrecognizer.js"></script>
    </body>
</html>
